# Pre-commit hooks for code quality
# Install: pre-commit install
# Run manually: pre-commit run --all-files

repos:
  # Basic file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: ^tests/.*\.txt$
      - id: end-of-file-fixer
        exclude: ^tests/.*\.txt$
      - id: check-yaml
      - id: check-added-large-files
        args: ['--maxkb=1000']
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Ruff - fast auto-fix linting followed by formatting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.14.9
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # Type checking with ty
  - repo: local
    hooks:
      - id: ty
        name: ty
        entry: uv run ty
        language: system
        pass_filenames: false
        args: [check]
      - id: import-linter
        name: import-linter
        entry: uv run lint-imports
        language: system
        pass_filenames: false
      - id: deptry
        name: deptry
        entry: uv run deptry
        language: system
        pass_filenames: false
        args: [src, --known-first-party, src]
      - id: vulture
        name: vulture
        entry: uv run vulture
        language: system
        pass_filenames: false
        args: [src, --min-confidence, "70"]
