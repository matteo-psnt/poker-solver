# Profiling Configuration
# Local-only scratch config for py-spy flamegraph capture: quick_test tree/abstraction
# with checkpointing pushed out of the sampling window. Not for real training runs.

resolver:
  max_raises_per_street: 3

solver:
  iteration_weighting: none

training:
  num_iterations: 10000
  checkpoint_frequency: 10000
  iterations_per_worker: 1000

card_abstraction:
  config: quick_test

storage:
  initial_capacity: 1000000

system:
  seed: 42
  config_name: "profiling"
