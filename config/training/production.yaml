# Production Training Configuration for HUNLHE Solver
# Uses Discounted CFR (DCFR) for faster convergence than Linear/vanilla CFR.
#
# (Convergence targets removed: earlier per-iteration mbb/g estimates came from the
# legacy rollout estimator and are not trustworthy; use LBR after training instead.)

solver:
  iteration_weighting: dcfr

action_model:
  preflop_templates:
    sb_first_in: ["fold", "call", 2.5, 3.5, 5.0]
    bb_vs_open: ["fold", "call", "3.5x_open", "4.5x_open"]
    sb_vs_3bet: ["fold", "call", "2.3x_last", "jam"]
  postflop_templates:
    first_aggressive: [0.33, 0.66, 1.25]
    facing_bet: ["min_raise", "pot_raise", "jam"]
    after_one_raise: ["pot_raise", "jam"]
    after_two_raises: ["jam"]

resolver:
  max_raises_per_street: 5

card_abstraction:
  config: production

training:
  num_iterations: 1000000
  checkpoint_frequency: 500000
  iterations_per_worker: 5000

storage:
  initial_capacity: 4000000

system:
  config_name: "production"
